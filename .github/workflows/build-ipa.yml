name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: IPAAgents
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned, no codesign)
        run: |
          xcodebuild \
            -project IPAAgents.xcodeproj \
            -scheme IPAAgents \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package into unsigned .ipa
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/IPAAgents.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"; exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry IPAAgents-unsigned.ipa Payload
          rm -rf Payload
          ls -lh IPAAgents-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPAAgents-unsigned-ipa
          path: IPAAgents/IPAAgents-unsigned.ipa
          if-no-files-found: error
